name: Tealium Governance CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # full history so the Impact Agent can diff against the base

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint extensions
        run: npm run lint

      - name: Knowledge Agent — refresh metadata (+ live drift check if creds set)
        env:
          TEALIUM_ACCOUNT: ${{ secrets.TEALIUM_ACCOUNT }}
          TEALIUM_PROFILE: ${{ secrets.TEALIUM_PROFILE }}
          TEALIUM_API_TOKEN: ${{ secrets.TEALIUM_API_TOKEN }}
        run: npm run knowledge:pull

      - name: Validation Agent — enforce policy (blocks merge on failure)
        run: npm run validate

      - name: Impact Agent — analyse blast radius
        id: impact
        run: |
          node scripts/impact-agent.js > impact-report.md
          cat impact-report.md

      - name: AI Review Agent — LLM-assisted review (advisory; needs ANTHROPIC_API_KEY)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: npm run ai:review

      - name: Documentation Agent — verify docs are up to date
        run: |
          npm run docs
          if ! git diff --quiet docs/; then
            echo "::error::Generated docs are stale. Run 'npm run docs' and commit the result.";
            git --no-pager diff --stat docs/;
            exit 1;
          fi

      - name: Post PR review with inline comments
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const read = f => fs.existsSync(f) ? fs.readFileSync(f, 'utf8') : '';

            // 1. Post summary comment (impact + AI markdown)
            const body = [read('impact-report.md'), read('ai-review.md')].filter(Boolean).join('\n\n---\n\n');
            if (body) {
              await github.rest.issues.createComment({
                owner: context.repo.owner, repo: context.repo.repo,
                issue_number: context.issue.number, body
              });
            }

            // 2. Post inline review comments from ai-review.json (line-level findings)
            if (!fs.existsSync('ai-review.json')) return;
            let aiResult;
            try { aiResult = JSON.parse(fs.readFileSync('ai-review.json', 'utf8')); }
            catch (e) { return; }

            const findings = (aiResult.findings || []).filter(f => f.file && f.line && f.severity !== 'INFO');
            if (!findings.length) return;

            // Get latest commit SHA on the PR head
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number
            });
            const commitId = pr.data.head.sha;

            const sevLabel = { CRITICAL: '[CRITICAL]', ERROR: '[ERROR]', WARNING: '[WARNING]' };
            const comments = findings.map(f => ({
              path: f.file,
              line: f.line,
              side: 'RIGHT',
              body: `**${sevLabel[f.severity] || f.severity} \`${f.rule || 'AI'}\`** — ${f.summary}\n\n> ${f.suggestion || ''}`
            }));

            await github.rest.pulls.createReview({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number,
              commit_id: commitId,
              event: aiResult.verdict === 'block' ? 'REQUEST_CHANGES' : 'COMMENT',
              body: `AI Review: ${aiResult.verdict?.toUpperCase() || 'DONE'} — ${aiResult.summary || ''}`,
              comments
            });
